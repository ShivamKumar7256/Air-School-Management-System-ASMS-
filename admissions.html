<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admissions - Air School</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-plane"></i>
                <h1>Air School Management System</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="students.html">Students</a></li>
                    <li><a href="faculty.html">Faculty</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="admissions.html" class="active">Admissions</a></li>
                    <li><a href="attendance.html">Attendance</a></li>
                    <li><a href="finance.html">Finance</a></li>
                    <li><a href="reports.html">Reports</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <span id="userName">Admin</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h2>Student Admissions Management</h2>
                <button class="btn btn-primary" onclick="openAdmissionModal()">
                    <i class="fas fa-plus"></i> New Admission
                </button>
            </div>

            <!-- Search and Filter -->
            <div class="search-filter">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search admissions...">
                    <i class="fas fa-search"></i>
                </div>
                <div class="filter-options">
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="Applied">Applied</option>
                        <option value="Approved">Approved</option>
                        <option value="Rejected">Rejected</option>
                        <option value="Waitlisted">Waitlisted</option>
                    </select>
                    <select id="courseFilter">
                        <option value="">All Courses</option>
                        <option value="PPL">PPL</option>
                        <option value="CPL">CPL</option>
                        <option value="ATPL">ATPL</option>
                    </select>
                </div>
            </div>

            <!-- Admissions Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Course</th>
                            <th>Status</th>
                            <th>Admission Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admissionsTableBody">
                        <!-- Data will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- Admission Modal -->
            <div id="admissionModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">New Student Admission</h3>
                        <span class="close" onclick="closeAdmissionModal()">&times;</span>
                    </div>
                    <form id="admissionForm" class="modal-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone *</label>
                                <input type="tel" id="phone" name="phone" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth *</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <textarea id="address" name="address" rows="3"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="course">Course *</label>
                                <select id="course" name="course" required>
                                    <option value="">Select Course</option>
                                    <option value="PPL">Private Pilot License (PPL)</option>
                                    <option value="CPL">Commercial Pilot License (CPL)</option>
                                    <option value="ATPL">Airline Transport Pilot License (ATPL)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="admissionStatus">Admission Status</label>
                                <select id="admissionStatus" name="admissionStatus">
                                    <option value="Pending">Pending</option>
                                    <option value="Approved">Approved</option>
                                    <option value="Rejected">Rejected</option>
                                    <option value="Waitlisted">Waitlisted</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="documentsSubmitted">Documents Submitted</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="documents" value="ID"> ID Copy</label>
                                <label><input type="checkbox" name="documents" value="Medical"> Medical Certificate</label>
                                <label><input type="checkbox" name="documents" value="Education"> Education Certificates</label>
                                <label><input type="checkbox" name="documents" value="Experience"> Flight Experience</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="notes">Notes</label>
                            <textarea id="notes" name="notes" rows="3"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeAdmissionModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Admission</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/admissions.js"></script>
</body>
</html>
