<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Air School Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Air School Management System - Debug Page</h1>
    
    <div class="debug-section">
        <h3>Backend Connection Test</h3>
        <button onclick="testBackend()">Test Backend Connection</button>
        <div id="backendResult"></div>
    </div>
    
    <div class="debug-section">
        <h3>Authentication Test</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="debug-section">
        <h3>API Endpoints Test</h3>
        <button onclick="testEndpoints()">Test All Endpoints</button>
        <div id="endpointsResult"></div>
    </div>
    
    <div class="debug-section">
        <h3>Local Storage</h3>
        <button onclick="checkLocalStorage()">Check Local Storage</button>
        <div id="storageResult"></div>
    </div>

    <script>
        async function testBackend() {
            const resultDiv = document.getElementById('backendResult');
            resultDiv.innerHTML = '<p>Testing backend connection...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/test');
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✓ Backend is running</h4>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>✗ Backend error</h4>
                            <p>Status: ${response.status}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>✗ Connection failed</h4>
                        <p>Error: ${error.message}</p>
                        <p>Make sure the backend is running on port 5000</p>
                    </div>
                `;
            }
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<p>Testing login...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✓ Login successful</h4>
                            <p>Token: ${data.token.substring(0, 50)}...</p>
                            <p>User: ${data.user.username}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>✗ Login failed</h4>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>✗ Login error</h4>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testEndpoints() {
            const resultDiv = document.getElementById('endpointsResult');
            resultDiv.innerHTML = '<p>Testing API endpoints...</p>';
            
            const endpoints = [
                { name: 'Dashboard', url: 'http://localhost:5000/api/dashboard' },
                { name: 'Students', url: 'http://localhost:5000/api/students' },
                { name: 'Faculty', url: 'http://localhost:5000/api/faculty' },
                { name: 'Courses', url: 'http://localhost:5000/api/courses' }
            ];
            
            let results = '';
            
            for (const endpoint of endpoints) {
                try {
                    const token = localStorage.getItem('token');
                    const response = await fetch(endpoint.url, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        results += `<div class="success">✓ ${endpoint.name}: OK</div>`;
                    } else {
                        results += `<div class="error">✗ ${endpoint.name}: ${response.status} ${response.statusText}</div>`;
                    }
                } catch (error) {
                    results += `<div class="error">✗ ${endpoint.name}: ${error.message}</div>`;
                }
            }
            
            resultDiv.innerHTML = results;
        }
        
        function checkLocalStorage() {
            const resultDiv = document.getElementById('storageResult');
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            let html = '<h4>Local Storage Status</h4>';
            
            if (token) {
                html += `<div class="success">✓ Token: ${token.substring(0, 50)}...</div>`;
            } else {
                html += `<div class="warning">⚠ No token found</div>`;
            }
            
            if (user) {
                const userData = JSON.parse(user);
                html += `<div class="success">✓ User: ${userData.username}</div>`;
            } else {
                html += `<div class="warning">⚠ No user data found</div>`;
            }
            
            resultDiv.innerHTML = html;
        }
        
        // Auto-run tests on page load
        window.onload = function() {
            testBackend();
            checkLocalStorage();
        };
    </script>
</body>
</html>
