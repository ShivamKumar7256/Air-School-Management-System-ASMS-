<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management - Air School</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-plane"></i>
                <h1>Air School Management System</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="students.html">Students</a></li>
                    <li><a href="faculty.html">Faculty</a></li>
                    <li><a href="courses.html" class="active">Courses</a></li>
                    <li><a href="attendance.html">Attendance</a></li>
                    <li><a href="finance.html">Finance</a></li>
                    <li><a href="reports.html">Reports</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <span id="userName">Admin</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h2>Course Management</h2>
                <button class="btn btn-primary" onclick="openCourseModal()">
                    <i class="fas fa-plus"></i> Add New Course
                </button>
            </div>

            <!-- Search and Filter -->
            <div class="search-filter">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search courses...">
                    <i class="fas fa-search"></i>
                </div>
                <div class="filter-options">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Pilot Training">Pilot Training</option>
                        <option value="Ground School">Ground School</option>
                        <option value="Simulator">Simulator</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Courses Grid -->
            <div class="courses-grid" id="coursesGrid">
                <!-- Course cards will be populated by JavaScript -->
            </div>

            <!-- Course Modal -->
            <div id="courseModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">Add New Course</h3>
                        <span class="close" onclick="closeCourseModal()">&times;</span>
                    </div>
                    <form id="courseForm" class="modal-body">
                        <div class="form-group">
                            <label for="courseName">Course Name *</label>
                            <input type="text" id="courseName" name="courseName" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code *</label>
                            <input type="text" id="courseCode" name="courseCode" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" name="category" required>
                                <option value="">Select Category</option>
                                <option value="Pilot Training">Pilot Training</option>
                                <option value="Ground School">Ground School</option>
                                <option value="Simulator">Simulator</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration (months) *</label>
                            <input type="number" id="duration" name="duration" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="fee">Course Fee *</label>
                            <input type="number" id="fee" name="fee" min="0" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="instructor">Instructor</label>
                            <select id="instructor" name="instructor">
                                <option value="">Select Instructor</option>
                                <!-- Options will be populated by JavaScript -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="maxStudents">Maximum Students *</label>
                            <input type="number" id="maxStudents" name="maxStudents" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="startDate">Start Date</label>
                            <input type="date" id="startDate" name="startDate">
                        </div>
                        <div class="form-group">
                            <label for="status">Status *</label>
                            <select id="status" name="status" required>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeCourseModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Course</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2024 Air School Management System. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
